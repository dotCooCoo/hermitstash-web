name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: ${{ github.event_name == 'pull_request' && 'Dry-run' || 'Deploy' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: node --check src/worker.js

      - name: Compute asset SHA3-512
        run: |
          set -euo pipefail
          HASH=$(curl -sSf https://assets.hermitstash.com/pqc.svg | openssl dgst -sha3-512 | awk '{print $NF}')
          if [ -z "$HASH" ]; then
            echo "::error::Failed to compute SHA3-512 of pqc.svg"
            exit 1
          fi
          echo "ASSET_VERSION=$HASH" >> "$GITHUB_ENV"
          echo "Computed SHA3-512: $HASH"

      - name: Deploy (dry-run on PRs)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: ${{ github.event_name == 'pull_request' && 'deploy --dry-run' || 'deploy' }} --var ASSET_VERSION:${{ env.ASSET_VERSION }}

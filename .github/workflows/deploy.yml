name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: ${{ github.event_name == 'pull_request' && 'Dry-run' || 'Deploy' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: node --check src/worker.js

      - name: Sync public/ to R2 bucket pqc
        if: github.event_name != 'pull_request'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          # One-time cleanup: remove stray empty "public/" folder marker left by an earlier dashboard action
          echo "Removing stray public/ folder marker from bucket pqc"
          npx wrangler r2 object delete "pqc/public/" --remote || true
          for f in public/img/icons/favicon-16x16.png \
                   public/img/icons/favicon-32x32.png \
                   public/img/icons/apple-touch-icon.png \
                   public/img/icons/icon-192.png \
                   public/img/icons/icon-512.png \
                   public/img/og-image.png; do
            key="${f#public/}"
            echo "Uploading $f -> pqc/$key"
            npx wrangler r2 object put "pqc/$key" --file="$f" --content-type=image/png --remote
          done

      - name: Compute asset SHA3-512
        run: |
          set -euo pipefail
          HASH=$(curl -sSf https://assets.hermitstash.com/pqc.svg | openssl dgst -sha3-512 | awk '{print $NF}')
          if [ -z "$HASH" ]; then
            echo "::error::Failed to compute SHA3-512 of pqc.svg"
            exit 1
          fi
          echo "ASSET_VERSION=$HASH" >> "$GITHUB_ENV"
          echo "Computed SHA3-512: $HASH"

      - name: Deploy (dry-run on PRs)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: ${{ github.event_name == 'pull_request' && 'deploy --dry-run' || 'deploy' }} --var ASSET_VERSION:${{ env.ASSET_VERSION }}
